<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root,
        [data-theme="light"] {
            --bg-gradient: linear-gradient(160deg, #7dd3fc 0%, #bae6fd 30%, #fde68a 65%, #fb923c 100%);
            --bg-sun: radial-gradient(circle at 85% 12%, rgba(255, 236, 120, 0.55) 0%, transparent 42%);
            --calc-bg: rgba(255, 255, 255, 0.92);
            --calc-shadow: 0 20px 60px rgba(251, 146, 60, 0.25);
            --calc-border: rgba(255, 255, 255, 0.6);
            --display-bg: #1e3a5f;
            --display-text: #ffffff;
            --btn-bg: #f8fafc;
            --btn-text: #334155;
            --btn-hover: #e2e8f0;
            --btn-shadow: rgba(15, 23, 42, 0.15);
            --operator-bg: #0ea5e9;
            --operator-hover: #0284c7;
            --equals-bg: #f97316;
            --equals-hover: #ea580c;
            --clear-bg: #ef4444;
            --clear-hover: #dc2626;
            --toggle-bg: rgba(255, 255, 255, 0.75);
            --toggle-text: #0f172a;
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(160deg, #0c4a6e 0%, #1e3a5f 40%, #7c2d12 85%, #451a03 100%);
            --bg-sun: radial-gradient(circle at 80% 8%, rgba(251, 191, 36, 0.2) 0%, transparent 38%);
            --calc-bg: rgba(15, 23, 42, 0.88);
            --calc-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
            --calc-border: rgba(255, 255, 255, 0.08);
            --display-bg: #020617;
            --display-text: #f8fafc;
            --btn-bg: #1e293b;
            --btn-text: #e2e8f0;
            --btn-hover: #334155;
            --btn-shadow: rgba(0, 0, 0, 0.35);
            --operator-bg: #0891b2;
            --operator-hover: #0e7490;
            --equals-bg: #ea580c;
            --equals-hover: #c2410c;
            --clear-bg: #b91c1c;
            --clear-hover: #991b1b;
            --toggle-bg: rgba(30, 41, 59, 0.85);
            --toggle-text: #fde68a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-gradient);
            padding: 20px;
            transition: background 0.4s ease;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: var(--bg-sun);
            pointer-events: none;
            z-index: 0;
        }

        .calculator {
            position: relative;
            z-index: 1;
            background: var(--calc-bg);
            border: 1px solid var(--calc-border);
            border-radius: 20px;
            box-shadow: var(--calc-shadow);
            padding: 30px;
            max-width: 400px;
            width: 100%;
            backdrop-filter: blur(8px);
            transition: background 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .calculator-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 16px;
        }

        .theme-toggle {
            background: var(--toggle-bg);
            color: var(--toggle-text);
            border: 1px solid var(--calc-border);
            border-radius: 999px;
            font-size: 1.25rem;
            padding: 8px 14px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            line-height: 1;
        }

        .theme-toggle:hover {
            transform: scale(1.05);
        }

        .display {
            background: var(--display-bg);
            color: var(--display-text);
            font-size: 2.5rem;
            padding: 20px;
            text-align: right;
            border-radius: 10px;
            margin-bottom: 20px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            word-wrap: break-word;
            overflow-wrap: break-word;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        button {
            background: var(--btn-bg);
            border: none;
            border-radius: 10px;
            font-size: 1.5rem;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            color: var(--btn-text);
        }

        button:hover {
            background: var(--btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--btn-shadow);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 2px 5px var(--btn-shadow);
        }

        .operator {
            background: var(--operator-bg);
            color: #ffffff;
        }

        .operator:hover {
            background: var(--operator-hover);
        }

        .equals {
            background: var(--equals-bg);
            color: #ffffff;
        }

        .equals:hover {
            background: var(--equals-hover);
        }

        .clear {
            background: var(--clear-bg);
            color: #ffffff;
        }

        .clear:hover {
            background: var(--clear-hover);
        }

        .zero {
            grid-column: span 2;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="calculator-header">
            <button class="theme-toggle" id="themeToggle" type="button" aria-label="Переключить тему">🌙</button>
        </div>
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="appendOperator('/')">/</button>
            <button class="operator" onclick="appendOperator('*')">×</button>
            <button class="operator" onclick="deleteLast()">⌫</button>
            
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('-')">-</button>
            
            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="appendOperator('+')">+</button>
            
            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button class="equals" onclick="calculate()" rowspan="2">=</button>
            
            <button class="zero" onclick="appendNumber('0')">0</button>
            <button onclick="appendDecimal()">.</button>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let currentInput = '0';
        let shouldResetDisplay = false;

        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');

        function getPreferredTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'light' || saved === 'dark') {
                return saved;
            }
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function applyTheme(theme) {
            html.setAttribute('data-theme', theme);
            themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
            themeToggle.setAttribute(
                'aria-label',
                theme === 'dark' ? 'Включить светлую тему' : 'Включить тёмную тему'
            );
            localStorage.setItem('theme', theme);
        }

        function toggleTheme() {
            const nextTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            applyTheme(nextTheme);
        }

        applyTheme(getPreferredTheme());
        themeToggle.addEventListener('click', toggleTheme);

        function updateDisplay() {
            display.textContent = currentInput;
        }

        function appendNumber(number) {
            if (shouldResetDisplay) {
                currentInput = '0';
                shouldResetDisplay = false;
            }
            
            if (currentInput === '0') {
                currentInput = number;
            } else {
                currentInput += number;
            }
            updateDisplay();
        }

        function appendDecimal() {
            if (shouldResetDisplay) {
                currentInput = '0';
                shouldResetDisplay = false;
            }
            
            if (!currentInput.includes('.')) {
                currentInput += '.';
                updateDisplay();
            }
        }

        function appendOperator(operator) {
            if (shouldResetDisplay) {
                shouldResetDisplay = false;
            }
            
            const lastChar = currentInput[currentInput.length - 1];
            if (['+', '-', '*', '/'].includes(lastChar)) {
                currentInput = currentInput.slice(0, -1) + operator;
            } else {
                currentInput += operator;
            }
            updateDisplay();
        }

        function calculate() {
            try {
                let expression = currentInput.replace(/×/g, '*');
                
                if (expression.includes('/0') && !expression.includes('/0.')) {
                    currentInput = 'Ошибка';
                    updateDisplay();
                    shouldResetDisplay = true;
                    return;
                }
                
                const result = Function('"use strict"; return (' + expression + ')')();
                
                if (isNaN(result) || !isFinite(result)) {
                    currentInput = 'Ошибка';
                } else {
                    currentInput = result.toString();
                }
                
                updateDisplay();
                shouldResetDisplay = true;
            } catch (error) {
                currentInput = 'Ошибка';
                updateDisplay();
                shouldResetDisplay = true;
            }
        }

        function clearDisplay() {
            currentInput = '0';
            shouldResetDisplay = false;
            updateDisplay();
        }

        function deleteLast() {
            if (shouldResetDisplay) {
                clearDisplay();
                return;
            }
            
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            updateDisplay();
        }

        document.addEventListener('keydown', function(event) {
            const key = event.key;
            
            if (key >= '0' && key <= '9') {
                appendNumber(key);
            } else if (key === '.') {
                appendDecimal();
            } else if (key === '+') {
                appendOperator('+');
            } else if (key === '-') {
                appendOperator('-');
            } else if (key === '*') {
                appendOperator('*');
            } else if (key === '/') {
                event.preventDefault();
                appendOperator('/');
            } else if (key === 'Enter' || key === '=') {
                event.preventDefault();
                calculate();
            } else if (key === 'Escape' || key === 'c' || key === 'C') {
                clearDisplay();
            } else if (key === 'Backspace') {
                deleteLast();
            }
        });
    </script>
</body>
</html>
